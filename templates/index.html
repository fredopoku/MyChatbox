<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chatbot 🤖</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; margin-top: 50px; transition: background 0.3s, color 0.3s; }
        .chatbox { width: 50%; margin: auto; border: 1px solid #ccc; padding: 10px; border-radius: 10px; background: white; }
        .chatbox p { padding: 10px; border-radius: 5px; }
        .user { text-align: right; color: blue; background: #d0e4ff; }
        .bot { text-align: left; color: green; background: #c6f6d5; }
        .typing { font-style: italic; color: gray; }
        .dark-mode { background: #222; color: white; }
        .dark-mode .chatbox { background: #333; border-color: white; }
        .dark-mode .user { background: #3b82f6; color: white; }
        .dark-mode .bot { background: #34d399; color: white; }
        button { margin: 10px; padding: 10px; cursor: pointer; }
    </style>
</head>
<body>
    <button onclick="toggleDarkMode()">🌙 Toggle Dark Mode</button>
    <h1>Chatbot 🤖</h1>
    <div class="chatbox" id="chatbox">
        <p class="bot"><strong>Bot:</strong> Hello! How can I help you?</p>
    </div>
    <p id="typingIndicator" class="typing" style="display: none;">Bot is typing...</p>
    <input type="text" id="user_input" placeholder="Type a message..." onkeypress="handleKeyPress(event)" />
    <button onclick="sendMessage()">Send</button>

    <script>
        function sendMessage() {
            let userInput = document.getElementById("user_input").value.trim();
            let chatbox = document.getElementById("chatbox");
            let typingIndicator = document.getElementById("typingIndicator");

            if (userInput === "") return; // Prevent empty messages

            let userMessage = `<p class="user"><strong>You:</strong> ${userInput}</p>`;
            chatbox.innerHTML += userMessage;
            typingIndicator.style.display = "block"; // Show "Bot is typing..."
            
            fetch("/chat", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ message: userInput }),
            })
            .then(response => response.json())
            .then(data => {
                typingIndicator.style.display = "none"; // Hide typing indicator
                let botMessage = `<p class="bot"><strong>Bot:</strong> ${data.response}</p>`;
                chatbox.innerHTML += botMessage;
                chatbox.scrollTop = chatbox.scrollHeight; // Auto-scroll
            })
            .catch(error => {
                console.error("Error:", error);
                typingIndicator.style.display = "none";
                chatbox.innerHTML += `<p class="bot"><strong>Bot:</strong> Oops! Something went wrong.</p>`;
            });

            document.getElementById("user_input").value = "";
        }

        function handleKeyPress(event) {
            if (event.key === "Enter") sendMessage();
        }

        function toggleDarkMode() {
            document.body.classList.toggle("dark-mode");
            localStorage.setItem("darkMode", document.body.classList.contains("dark-mode") ? "enabled" : "disabled");
        }

        window.onload = function () {
            if (localStorage.getItem("darkMode") === "enabled") document.body.classList.add("dark-mode");
        };
    </script>
</body>
</html>
